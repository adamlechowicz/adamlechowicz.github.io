# About Section

# First sentence of bio — edit here to update both the main card tooltip and the bio paragraph.
bio_intro: >-
  I'm currently a Research Intern at <a href="https://www.microsoft.com/en-us/research/lab/microsoft-research-redmond/">Microsoft Research Redmond</a> in the <a href="https://www.microsoft.com/en-us/research/lab/microsoft-research-redmond/">Networking Research Group</a>, working with  <a href="https://www.microsoft.com/en-us/research/people/bearzani/projects/">Behnaz Arzani</a>, <a href="https://poorianamyar.github.io">Pooria Namyar</a>, and <a href="https://www.microsoft.com/en-us/research/people/kmellou/">Konstantina Mellou</a>.

about: >
  
  <p class="lead" style="font-variant:small-caps">
  </p>
  
  <div class="campus-stack-wrapper" id="campus-stack-wrapper">
    <div class="campus-stack-sizer"></div>

    <div class="campus-card past-card" data-url="https://www.umass.edu" data-label="UMass →">
      <div class="campus-card-bg" style="background-image: url('/assets/img/500x300.png');"></div>
      <div class="campus-card-overlay"><span>UMass (undergrad) <em>→</em></span></div>
      <div class="campus-card-tooltip"><p>I received a B.S. in Computer Science and a B.A. in Political Science from UMass Amherst in May 2022. I completed an honors thesis on opinion polarization in social networks working with <a href="https://people.cs.umass.edu/~cmusco/">Cameron Musco</a>. I was honored as a <a href="https://www.umass.edu/gateway/article/computing-greater-good">Rising Researcher</a> and a <a href="https://www.umass.edu/news/article/ten-outstanding-graduates-be-honored-21st-century-leaders-umass-amherst-commencement">21st Century Leader</a>, which are the highest undergraduate honors at UMass.</p></div>
    </div>

    <div class="campus-card past-card" data-url="https://www.caltech.edu" data-label="Caltech →">
      <div class="campus-card-bg" style="background-image: url('/assets/img/5x3caltech.jpeg');"></div>
      <div class="campus-card-overlay"><span>Caltech <em>→</em></span></div>
      <div class="campus-card-tooltip"><p>In Summer 2023, I was a visiting researcher at <a href="https://www.caltech.edu">Caltech</a> in Computing and Mathematical Sciences, advised by <a href="https://adamwierman.com">Adam Wierman</a>. I worked on algorithms to solve online optimization problems that arise in sustainable computing, such as <a href="https://dl.acm.org/doi/10.1145/3626776">carbon-aware load shifting</a>.</p></div>
    </div>

    <div class="campus-card past-card" data-url="https://www.nrel.gov" data-label="NREL →">
      <div class="campus-card-bg" style="background-image: url('/assets/img/5x3nrel.jpeg');"></div>
      <div class="campus-card-overlay"><span>NREL <em>→</em></span></div>
      <div class="campus-card-tooltip"><p>I completed my DOE CSGF practicum in Summer 2024 at the Power Systems Engineering Center of the <a href="https://nrel.gov">National Renewable Energy Laboratory</a> (currently National Laboratory of the Rockies), mentored by <a href="https://research-hub.nrel.gov/en/persons/joshua-comden/">Joshua Comden</a> and <a href="https://scholar.google.com/citations?user=oLPQszQAAAAJ&amp;hl=en">Andrey Bernstein</a>. I worked on optimizing incentives under human-driven uncertainties in power grids.</p></div>
    </div>

    <div class="campus-card past-card" data-url="https://www.umass.edu" data-label="UMass →">
      <div class="campus-card-bg" style="background-image: url('/assets/img/5x3.jpeg');"></div>
      <div class="campus-card-overlay"><span>UMass <em>→</em></span></div>
      <div class="campus-card-tooltip"><p>I am a fourth-year Ph.D. candidate in the <a href="https://www.cics.umass.edu">Manning College of Information and Computer Sciences</a> at the University of Massachusetts Amherst, advised by <a href="https://groups.cs.umass.edu/hajiesmaili/">Mohammad Hajiesmaili</a> and <a href="https://people.cs.umass.edu/~shenoy/index.html">Prashant Shenoy</a>.</p></div>
    </div>

    <div class="campus-past-btn" id="campus-past-btn"><span>past →</span></div>

    <div class="campus-card main-card" id="campus-main-card" data-url="https://www.microsoft.com/en-us/research/lab/microsoft-research-redmond/">
      <div class="campus-card-bg" style="background-image: url('/assets/img/5x3msr.jpeg');"></div>
      <div class="campus-card-overlay"><span>MSR <em>→</em></span></div>
      <div class="campus-card-tooltip"><p>BIO_INTRO_PLACEHOLDER</p></div>
    </div>
  </div>
  <img src="/assets/img/bio2_photo.jpeg" alt="Photo of Adam Lechowicz" style="width: 33%; border-radius: 25px; box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.3), 0 6px 20px 0 rgba(0, 0, 0, 0.28);"/>
  
  <p class="small" style="font-variant:small-caps">
  </p>
  
  #### Adam Lechowicz
  
  ***he/they***
  
  <p class="small" style="font-variant:small-caps">
  </p>

  BIO_INTRO_PLACEHOLDER

  I am also a fourth-year Ph.D. candidate in the <a href="https://www.cics.umass.edu">Manning College of Information and Computer Sciences</a> at the University of Massachusetts Amherst, advised by <a href="https://groups.cs.umass.edu/hajiesmaili/">Mohammad Hajiesmaili</a> and <a href="https://people.cs.umass.edu/~shenoy/index.html">Prashant Shenoy</a>.
  
  <p class="small" style="font-variant:small-caps">
  </p>
  
  I work at the intersection of theory and systems, with an emphasis on emerging problems in energy and sustainability.  From a theoretical perspective, I am interested in decision-making under uncertainty, particularly using the learning-augmented algorithms framework, which combines the provable guarantees of traditional algorithm design with AI-driven performance.  On the application side, I am interested in novel system designs that increase the flexibility, efficiency, and sustainability of energy systems or computing infrastructure. My work is supported by a [U.S. Department of Energy Computational Science Graduate Fellowship (CSGF)](https://www.krellinst.org/csgf/about-doe-csgf).

  <p class="small" style="font-variant:small-caps">
  </p>

  In Summer 2024, I worked with [Joshua Comden](https://research-hub.nrel.gov/en/persons/joshua-comden) at the [National Renewable Energy Laboratory](https://www.nrel.gov) (currently National Laboratory of the Rockies) on incentives and human-driven uncertainties in energy systems.  
  Before my Ph.D., I completed my undergraduate thesis with [Cameron Musco](https://people.cs.umass.edu/~cmusco/), studying polarization in social networks.

  <p class="small" style="font-variant:small-caps">
  </p>
  
  <!-- <p style="margin-bottom: 5px !important;">Through my research, I strive to advance ideals of social, racial, economic, and environmental justice.</p> -->
  
  email: alechowicz [at] umass [dot] edu

